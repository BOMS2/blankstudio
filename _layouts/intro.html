<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.data.settings.seo.description }}">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <link rel="stylesheet" href="{{ '/assets/css/intro.css' | relative_url }}">
    {% seo %}
  </head>
  <body class="intro-body">
    <main class="intro-page">
      <div class="intro-brand">BlankStudio PhotoBooth</div>

      <section class="intro-hero" aria-labelledby="intro-heading">
        <div class="intro-copy">
          <p class="intro-kicker">Wedding · Party · Event</p>
          <h1 class="intro-title" id="intro-heading">
            <span>우리의 하루를</span>
            <span>조금 더 특별하게</span>
          </h1>

          <a class="intro-cta" href="{{ '/home/' | relative_url }}">
            <span>Show BlankStudio</span>
            <span class="intro-cta__arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>

      <div class="intro-stage" aria-hidden="true" data-intro-stage></div>
    </main>

    <script>
      window.__INTRO_ASSETS__ = [
        "{{ '/assets/img/intro/camera.png' | relative_url }}",
        "{{ '/assets/img/intro/basicheart.png' | relative_url }}",
        "{{ '/assets/img/intro/redheart.png' | relative_url }}",
        "{{ '/assets/img/intro/greenheart.png' | relative_url }}",
        "{{ '/assets/img/intro/flower.png' | relative_url }}",
        "{{ '/assets/img/intro/frame.png' | relative_url }}",
        "{{ '/assets/img/intro/photobooth.png' | relative_url }}",
        "{{ '/assets/img/intro/photobook.png' | relative_url }}",
        "{{ '/assets/img/intro/party.png' | relative_url }}"
      ];
    </script>
    <script src="{{ '/assets/js/intro.js' | relative_url }}" defer></script>
  </body>
</html>
