<!DOCTYPE html>
<html lang="ko">
  <head>
    {% include site-root.html %}
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.data.settings.seo.description }}">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <link rel="stylesheet" href="{{ site_root }}/assets/css/intro.css">
    <link rel="stylesheet" href="{{ site_root }}/assets/css/fonts.css">
    {% seo %}
  </head>
  <body class="intro-body">
    <main class="intro-page">
      <div class="intro-brand">BlankStudio PhotoBooth</div>

      <section class="intro-hero" aria-labelledby="intro-heading">
        <div class="intro-copy">
          <p class="intro-kicker">Wedding · Party · Event</p>
          <h1 class="intro-title" id="intro-heading">
            <span>우리의 하루를</span>
            <span>조금 더 특별하게</span>
          </h1>

          <a class="intro-cta" href="{{ site_root }}/home">
            <span>Show BlankStudio</span>
            <span class="intro-cta__arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>

      <div class="intro-stage" aria-hidden="true" data-intro-stage></div>
    </main>

    <script>
      window.__INTRO_ASSETS__ = [
        "{{ site_root }}/assets/img/intro/camera.png",
        "{{ site_root }}/assets/img/intro/basicheart.png",
        "{{ site_root }}/assets/img/intro/redheart.png",
        "{{ site_root }}/assets/img/intro/greenheart.png",
        "{{ site_root }}/assets/img/intro/frame.png",
        "{{ site_root }}/assets/img/intro/photobooth.png",
        "{{ site_root }}/assets/img/intro/photobook.png",
        "{{ site_root }}/assets/img/intro/party.png"
      ];
    </script>
    <script src="{{ site_root }}/assets/js/intro.js" defer></script>
  </body>
</html>
