  <script>
    (function () {
      var toggle = document.querySelector('.bs-header__toggle');
      var nav = document.querySelector('.bs-header__nav');

      if (!toggle || !nav) return;

      toggle.addEventListener('click', function () {
        var expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!expanded));
        nav.classList.toggle('is-open', !expanded);
      });

      document.addEventListener('click', function (event) {
        var clickedInsideHeader = event.target.closest('.bs-header__inner');
        if (!clickedInsideHeader && nav.classList.contains('is-open')) {
          toggle.setAttribute('aria-expanded', 'false');
          nav.classList.remove('is-open');
        }
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 768) {
          toggle.setAttribute('aria-expanded', 'false');
          nav.classList.remove('is-open');
        }
      });
    })();
